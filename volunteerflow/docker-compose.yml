version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: volunteerflow-db
    environment:
      POSTGRES_USER: volunteerflow
      POSTGRES_PASSWORD: volunteerflow123
      POSTGRES_DB: volunteerflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: volunteerflow-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://volunteerflow:volunteerflow123@db:5432/volunteerflow
      JWT_SECRET: replace-with-a-long-random-secret-in-production
      JWT_EXPIRES_IN: 7d
    ports:
      - "3001:3001"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: volunteerflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: